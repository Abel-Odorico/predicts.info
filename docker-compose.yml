version: '3.9'

services:
  api:
    build: ./backend
    container_name: predicts_api
    restart: unless-stopped
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips=*"]
    env_file: .env
    environment:
      TZ: America/Sao_Paulo
      PREDICTS_DIST_DIR: /frontend_dist
      PREDICTS_BACKEND_DIR: /app
    ports:
      - "8130:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./frontend/dist:/frontend_dist
      - ./scripts:/scripts:ro
      - /var/log/predicts-cron.log:/var/log/predicts-cron.log:ro
    networks:
      - predicts_net

  db:
    image: postgres:15-alpine
    container_name: predicts_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - predicts_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - predicts_net

  redis:
    image: redis:7-alpine
    container_name: predicts_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - predicts_redis_data:/data
    networks:
      - predicts_net

volumes:
  predicts_db_data:
  predicts_redis_data:

networks:
  predicts_net:
    driver: bridge
